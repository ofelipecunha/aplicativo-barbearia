<div class="layout">
  <div class="background"></div>
  <div class="content">
    <div class="box">
      <img src="assets/logo.svg" alt="Barbearia" class="logo" />
      <h1>Faça seu cadastro</h1>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="field">
          <label for="nome">Nome</label>
          <input id="nome" type="text" pInputText formControlName="nome" placeholder="Nome" class="full" />
          @if (form.get('nome')?.invalid && form.get('nome')?.touched) {
            <small class="error">Nome obrigatório</small>
          }
        </div>
        <div class="field">
          <label for="login">Login</label>
          <input id="login" type="text" pInputText formControlName="login" placeholder="Login" class="full" />
          @if (form.get('login')?.invalid && form.get('login')?.touched) {
            <small class="error">Login obrigatório</small>
          }
        </div>
        <div class="field">
          <label for="senha">Senha</label>
          <p-password id="senha" formControlName="senha" placeholder="Senha" [feedback]="true" [toggleMask]="true" styleClass="full-width" inputStyleClass="full"></p-password>
          @if (form.get('senha')?.invalid && form.get('senha')?.touched) {
            <small class="error">Mínimo 6 caracteres</small>
          }
        </div>
        <p-button type="submit" label="Cadastrar" [loading]="loading" styleClass="full btn"></p-button>
      </form>

      <a routerLink="/login" class="link primary"><i class="pi pi-arrow-left"></i> Voltar para login</a>
    </div>
  </div>
</div>
